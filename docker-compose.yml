services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  mongodb:
    image: mongo:6
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: skillsync
    volumes:
      - mongodb_data:/data/db

  backend1:
    image: skillsync-backend1:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongodb:27017/skillsync
      - ACCESS_TOKEN_SECRET=demo-access-secret
      - SESSION_SECRET=demo-session-secret
      - NODE_ENV=development
    ports:
      - '5000:5000'
    depends_on:
      - redis
      - mongodb

  backend2:
    image: skillsync-backend2:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=5001
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongodb:27017/skillsync
      - ACCESS_TOKEN_SECRET=demo-access-secret
      - SESSION_SECRET=demo-session-secret
      - NODE_ENV=development
    ports:
      - '5001:5001'
    depends_on:
      - redis
      - mongodb

  nginx:
    image: nginx:stable-alpine
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2

networks:
  default:
    name: skill-sync-network

volumes:
  mongodb_data:
